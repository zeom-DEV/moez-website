<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moez Thabet // High-End Digital Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 50px -10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Background Dynamic Layer -->
    <div class="fixed inset-0 z-0 opacity-20" id="bg-shader"></div>

    <main class="relative z-10 max-w-7xl mx-auto px-6 py-12">
        <!-- Header -->
        <header class="flex justify-between items-center py-6 mb-20">
            <h1 class="text-2xl font-black tracking-tighter">MOEZ<span class="text-blue-500">.</span></h1>
            <nav class="space-x-8 text-sm font-medium opacity-60">
                <a href="#" class="hover:text-blue-400">Expertise</a>
                <a href="#" class="hover:text-blue-400">Impact</a>
                <a href="mailto:contact@moezthabet.com" class="border-b border-blue-500 pb-1">Me contacter</a>
            </nav>
        </header>

        <!-- Hero -->
        <section class="min-h-[60vh] flex flex-col justify-center">
            <div class="max-w-3xl">
                <h2 class="text-7xl md:text-9xl font-black mb-8 tracking-tighter leading-none">
                    Support <br/> d'Excellence.
                </h2>
                <p class="text-xl md:text-2xl text-gray-400 max-w-xl mb-12">
                    Expertise SAV & Relation Client de haute performance.
                    Optimisation des processus, rétention client, et support technique niveau 2.
                </p>
                <div class="flex gap-4">
                    <button class="px-8 py-4 bg-blue-600 rounded-full font-bold text-lg hover:bg-blue-500 transition glow">Démarrer une mission</button>
                    <button class="px-8 py-4 glass rounded-full font-bold text-lg hover:bg-white/10 transition">Voir la méthodologie</button>
                </div>
            </div>
        </section>

        <!-- Dynamic Stats Grid -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-20">
            <div class="glass p-8 rounded-3xl">
                <div class="text-4xl font-bold mb-2">99.2%</div>
                <div class="text-blue-400 uppercase tracking-widest text-xs font-bold">Satisfaction Client</div>
            </div>
            <div class="glass p-8 rounded-3xl">
                <div class="text-4xl font-bold mb-2">14K+</div>
                <div class="text-blue-400 uppercase tracking-widest text-xs font-bold">Tickets résolus</div>
            </div>
            <div class="glass p-8 rounded-3xl">
                <div class="text-4xl font-bold mb-2">2H</div>
                <div class="text-blue-400 uppercase tracking-widest text-xs font-bold">Temps de Réponse</div>
            </div>
        </section>
    </main>

    <script>
        // Interactive Background Logic
        const container = document.getElementById('bg-shader');
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            container.style.background = `radial-gradient(circle at ${x*100}% ${y*100}%, rgba(37, 99, 235, 0.15), transparent 50%)`;
        });
    </script>
</body>
</html>
